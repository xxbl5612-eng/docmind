version: "3.9"

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: docmind
      MYSQL_USER: docmind
      MYSQL_PASSWORD: docmind
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "docmind", "-pdocmind"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+asyncmy://docmind:docmind@mysql:3306/docmind
      - DATABASE_URL_SYNC=mysql+mysqldb://docmind:docmind@mysql:3306/docmind
      - REDIS_CACHE_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
      - REDIS_RESULT_BACKEND=redis://redis:6379/2
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - STORAGE_BUCKET=docmind
      - STORAGE_SECURE=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATABASE_URL=mysql+asyncmy://docmind:docmind@mysql:3306/docmind
      - DATABASE_URL_SYNC=mysql+mysqldb://docmind:docmind@mysql:3306/docmind
      - REDIS_CACHE_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
      - REDIS_RESULT_BACKEND=redis://redis:6379/2
      - STORAGE_ENDPOINT=minio:9000
      - STORAGE_ACCESS_KEY=minioadmin
      - STORAGE_SECRET_KEY=minioadmin
      - STORAGE_BUCKET=docmind
      - STORAGE_SECURE=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src

volumes:
  mysql_data:
  minio_data:
